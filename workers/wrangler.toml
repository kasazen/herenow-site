name = "herenow-first-read"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — set up via the Cloudflare dashboard once the zone exists.
# routes = [
#   { pattern = "api.herenowlabs.xyz/*", zone_name = "herenowlabs.xyz" }
# ]

# KV namespace for storing generated memos (24h TTL) and rate-limit counters.
# Create with:  wrangler kv namespace create FIRST_READ
# Then paste the returned id here.
[[kv_namespaces]]
binding = "FIRST_READ"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Public, non-secret config.
ALLOWED_ORIGIN = "https://herenowlabs.xyz"
EMAIL_FROM = "Here Now Labs <team@herenowlabs.xyz>"
CALENDLY_HREF = "https://herenowlabs.xyz/#book"

# Secrets — never commit. Set with:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put RESEND_API_KEY
