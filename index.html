<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Here Now Labs</title>
  <meta name="description" content="Here Now Labs, Inc. — an independent software studio." />
  <meta name="theme-color" content="#0b0b0f" />
  <meta property="og:title" content="Here Now Labs" />
  <meta property="og:description" content="Here Now Labs, Inc. — an independent software studio." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://herenowlabs.xyz" />
  <link rel="canonical" href="https://herenowlabs.xyz/" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0b0f'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23ffffff'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #ffffff;
      --fg: #0b0b0f;
      --muted: #6b6b75;
      --rule: #e6e6ea;
      --accent: #0b0b0f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0b0f;
        --fg: #f5f5f7;
        --muted: #8a8a94;
        --rule: #22222a;
        --accent: #f5f5f7;
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", Arial, sans-serif;
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 8vw, 6rem) clamp(1.25rem, 5vw, 3rem);
    }
    .card {
      max-width: 40rem;
      width: 100%;
    }
    .mark {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      margin-bottom: clamp(2rem, 6vw, 3.5rem);
    }
    .mark .dot {
      width: 0.625rem;
      height: 0.625rem;
      border-radius: 999px;
      background: var(--accent);
    }
    .mark .label {
      font-size: 0.8125rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    h1 {
      font-size: clamp(2.25rem, 6vw, 3.75rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 600;
      margin: 0 0 1.25rem 0;
    }
    p.lede {
      font-size: clamp(1.0625rem, 2vw, 1.1875rem);
      color: var(--muted);
      margin: 0 0 2rem 0;
      max-width: 32rem;
    }
    .contact {
      font-size: 0.9375rem;
      color: var(--muted);
    }
    .contact a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      transition: border-color 150ms ease;
    }
    .contact a:hover { border-bottom-color: var(--fg); }
    footer {
      border-top: 1px solid var(--rule);
      padding: 1.5rem clamp(1.25rem, 5vw, 3rem);
      font-size: 0.8125rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    @media (prefers-reduced-motion: no-preference) {
      .card { animation: rise 600ms cubic-bezier(.2,.7,.2,1) both; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="mark">
        <span class="dot" aria-hidden="true"></span>
        <span class="label">Here Now Labs</span>
      </div>
      <h1>Building thoughtful software.</h1>
      <p class="lede">Here Now Labs, Inc. is an independent software studio.</p>
      <p class="contact">Contact &mdash; <a href="mailto:team@askcorro.com">team@askcorro.com</a></p>
    </div>
  </main>
  <footer>
    <span>&copy; 2026 Here Now Labs, Inc. &mdash; a Delaware corporation.</span>
    <span>herenowlabs.xyz</span>
  </footer>
</body>
</html>
