<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Here Now Labs — OG image source</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400&family=Geist+Mono:wght@500&display=swap" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #faf9f5;
    font-family: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    color: #14141a;
    position: relative;
    padding: 80px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .eyebrow__glyph {
    width: 14px;
    height: 14px;
    background: #15803d;
  }
  .headline {
    margin-top: 96px;
    font-family: 'Fraunces', 'Times New Roman', serif;
    font-style: italic;
    font-size: 88px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.012em;
    color: #14141a;
  }
  .rule {
    margin-top: 40px;
    width: 360px;
    height: 1px;
    background: #d4d1c4;
  }
  .subline {
    margin-top: 28px;
    font-size: 18px;
    color: #4f4f57;
    letter-spacing: 0.005em;
  }
  .glyph {
    position: absolute;
    bottom: 80px;
    right: 80px;
    display: grid;
    grid-template-columns: repeat(3, 28px);
    grid-template-rows: repeat(2, 28px);
    gap: 8px;
  }
  .glyph div { background: #15803d; }
</style>
</head>
<body>
  <div class="eyebrow">
    <span class="eyebrow__glyph"></span>
    <span>HERE NOW LABS</span>
  </div>
  <div class="headline">AI is rewriting<br>how operators run.</div>
  <div class="rule"></div>
  <div class="subline">A day inside your operation. Every recommendation tied to a dollar figure.</div>
  <div class="glyph">
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
  </div>
</body>
</html>
